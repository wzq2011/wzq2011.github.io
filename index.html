<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WZQ Photos - 测试版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            background: #f0f3f5;
        }
        .header {
            background: #1F4D37;
            color: #fff;
            padding: 14px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 6px rgba(0,0,0,.1);
        }
        .nav-buttons {
            display: flex;
            gap: 12px; /* 按钮之间的间距，做成独立矩形 */
        }
        .nav-btn {
            background-color: #2E8B57; /* 绿色矩形按钮 */
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 4px;
            font-size: 14px;
            border: none;
            cursor: pointer;
            min-width: 120px; /* 统一按钮宽度，更像独立矩形 */
            text-align: center;
        }
        .nav-btn:hover {
            background-color: #1F4D37;
        }
        .welcome-text {
            color: white;
            font-size: 14px;
            line-height: 40px;
            margin-right: 12px;
        }
        .content {
            padding: 30px;
        }
        .test-notice {
            background-color: #fff3cd;
            border: 1px solid #ffeaa7;
            color: #856404;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
        }
        .contact-info {
            margin-top: 20px;
            font-size: 14px;
            color: #444;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>WZQ Photos</h1>
    <div class="nav-buttons" id="navBar">
        <a href="upload.html" class="nav-btn">传照片</a>
        <a href="feedback.html" class="nav-btn">给站长留言</a>
        <a href="login.html" class="nav-btn" id="loginBtn">登录</a>
        <a href="register.html" class="nav-btn" id="registerBtn">用户注册</a>
    </div>
</div>

<div class="content">
    <div class="test-notice">
        <strong>⚠️ 网站测试公告：</strong>
        <p>此网站目前处于测试阶段，功能尚未完全开放。</p>
        <p>部分页面和功能可能存在不稳定或无法使用的情况，请勿用于正式用途。</p>
        <p>感谢您的理解与支持，我们会尽快完善并正式上线！</p>
    </div>

    <h2>未来这里将展示优质照片</h2>
    <p>本项目预计一年时间完成，如果您感兴趣欢迎您的加入</p>
    <p>因本因人是建站新手，故无偿寻找技术人员支持，如果您愿意，请与我联系</p>
    
    <div class="contact-info">
        <p>📧 联系方式：
            邮箱：3810421790@qq.com</p>
            微信：wzq60722696</p>
        <p>✈️ 专注航空摄影与飞行记录</p>
    </div>
</div>

<script>
    window.onload = function() {
        let user = localStorage.getItem("username");
        let navBar = document.getElementById("navBar");

        if (user) {
            // 登录状态：显示欢迎语和退出按钮
            navBar.innerHTML = `
                <a href="upload.html" class="nav-btn">传照片</a>
                <a href="feedback.html" class="nav-btn">给站长留言</a>
                <span class="welcome-text">欢迎你，${user}</span>
                <button onclick="logout()" class="nav-btn">退出</button>
            `;
        }
    };

    function logout() {
        localStorage.removeItem("username");
        alert("已退出登录");
        location.href = "index.html";
    }
</script>

</body>
</html>
