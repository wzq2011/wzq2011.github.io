<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WZQ Photos - 航空摄影网站</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Microsoft Yahei", sans-serif;
  }
  body {
    background: #f0f3f5;
    padding: 0 10px;
  }
  .header {
    background: #1F4D37;
    color: #fff;
    padding: 14px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 2px 6px rgba(0,0,0,.1);
    border-radius: 8px;
    margin: 10px 0;
  }
  .header h1 {
    font-size: 28px;
  }
  .nav-buttons {
    display: flex;
    gap: 12px;
  }
  .nav-btn {
    background-color: #2E8B57;
    color: white;
    padding: 10px 20px;
    text-decoration: none;
    border-radius: 6px;
    font-size: 14px;
    white-space: nowrap;
  }
  .nav-btn:hover {
    background-color: #1F4D37;
  }
  .welcome-text {
    background: transparent;
    color: #fff;
    font-weight: bold;
    pointer-events: none;
  }
  @media (max-width: 768px) {
    .header {
      flex-direction: column;
      gap: 12px;
      padding: 16px;
    }
    .nav-buttons {
      flex-direction: column;
      width: 100%;
      gap: 8px;
    }
  }
</style>
</head>

<body>

<div class="header">
  <h1>WZQ Photos</h1>
  <div class="nav-buttons" id="navBar"></div>
</div>

<script>
window.onload = function() {
  const nav = document.getElementById('navBar');
  const user = localStorage.getItem('currentUser');

  if (user) {
    // 登录后：登录按钮 → 欢迎你，用户名
    nav.innerHTML = `
      <a href="upload.html" class="nav-btn">传照片</a>
      <a href="feedback.html" class="nav-btn">给站长留言</a>
      <a class="nav-btn welcome-text">欢迎你，${user}</a>
      <a href="register.html" class="nav-btn">用户注册</a>
      <a href="javascript:logout()" class="nav-btn">退出登录</a>
    `;
  } else {
    // 未登录：原样
    nav.innerHTML = `
      <a href="upload.html" class="nav-btn">传照片</a>
      <a href="feedback.html" class="nav-btn">给站长留言</a>
      <a href="login.html" class="nav-btn">登录</a>
      <a href="register.html" class="nav-btn">用户注册</a>
    `;
  }
};

function logout() {
  localStorage.removeItem('currentUser');
  window.location.href = 'index.html';
}
</script>

</body>
</html>
