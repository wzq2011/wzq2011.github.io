<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户登录 - WZQ Photos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            background: #f0f3f5;
        }
        /* 顶部绿色导航条，和首页完全一致 */
        .header {
            background: #1F4D37;
            color: #fff;
            padding: 14px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 6px rgba(0,0,0,.1);
            border-radius: 8px;
            margin: 10px;
        }
        .header h1 {
            font-size: 28px;
        }
        .back-home {
            color: #fff;
            text-decoration: none;
            background: #2E8B57;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 14px;
        }
        /* 登录表单卡片 */
        .login-card {
            background: #fff;
            max-width: 400px;
            margin: 30px auto;
            padding: 24px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,.1);
        }
        .login-card h2 {
            text-align: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #ccc;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            color: #333;
        }
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }
        .login-btn {
            width: 100%;
            background: #2E8B57;
            color: #fff;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }
        /* 新增：注册提示链接样式 */
        .register-tip {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            color: #666;
        }
        .register-tip a {
            color: #1F4D37;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <!-- 顶部绿色导航条，带返回首页 -->
    <div class="header">
        <h1>WZQ Photos</h1>
        <a href="index.html" class="back-home">返回首页</a>
    </div>

    <!-- 登录表单 -->
    <div class="login-card">
        <h2>用户登录</h2>
        <div class="form-group">
            <label>用户名</label>
            <input type="text" placeholder="请输入注册时的用户名">
        </div>
        <div class="form-group">
            <label>密码</label>
            <input type="password" placeholder="请输入密码">
        </div>
        <button class="login-btn">登录</button>
        <!-- 新增：注册提示链接 -->
        <div class="register-tip">
            还没有注册吗？<a href="register.html">点击注册</a>
        </div>
    </div>
</body>
</html>
