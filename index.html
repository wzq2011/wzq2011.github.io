<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WZQ Photos - 航空摄影网站</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }

        body {
            background: #f0f3f5;
            padding: 0 10px;
        }

        .header {
            background: #1F4D37;
            color: #fff;
            padding: 14px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 2px 6px rgba(0,0,0,.1);
            border-radius: 8px;
            margin: 10px 0;
        }

        .header h1 {
            margin-bottom: 12px;
            font-size: 28px;
        }

        .nav-buttons {
            display: flex;
            flex-direction: column;
            width: 100%;
            gap: 8px;
        }

        .nav-btn {
            background-color: #2E8B57;
            color: white;
            padding: 12px 0;
            text-align: center;
            text-decoration: none;
            border-radius: 6px;
            font-size: 16px;
        }

        .nav-btn:hover {
            background-color: #1F4D37;
        }

        /* 登录后显示的用户名样式 */
        .welcome-text {
            color: #fff;
            font-size: 16px;
            margin-bottom: 12px;
            font-weight: bold;
        }

        .test-notice {
            background-color: #fff3cd;
            border: 1px solid #ffeaa7;
            color: #856404;
            padding: 15px;
            border-radius: 6px;
            margin: 20px 0;
        }

        .content {
            padding: 0 10px;
        }

        .content h2 {
            color: #1F4D37;
            margin-bottom: 15px;
            font-size: 22px;
        }

        .content p {
            color: #444;
            line-height: 1.6;
            margin-bottom: 10px;
            font-size: 15px;
        }

        @media (min-width: 768px) {
            .header {
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
            }
            .header h1, .welcome-text {
                margin-bottom: 0;
            }
            .nav-buttons {
                flex-direction: row;
                width: auto;
                gap: 12px;
            }
            .nav-btn {
                padding: 10px 20px;
            }
            body {
                padding: 0 20px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>WZQ Photos</h1>
        
        <!-- 这里是显示用户名的区域 -->
        <div id="welcomeMessage" class="welcome-text"></div>

        <div class="nav-buttons" id="navBar">
            <a href="upload.html" class="nav-btn">传照片</a>
            <a href="feedback.html" class="nav-btn">给站长留言</a>
            <a href="login.html" class="nav-btn">登录</a>
            <a href="register.html" class="nav-btn">用户注册</a>
        </div>
    </div>

    <div class="content">
        <div class="test-notice">
            <strong>⚠️ 网站测试公告：</strong>
            <p>此网站目前处于测试阶段，功能尚未完全开放。</p>
            <p>部分页面和功能可能存在不稳定或无法使用的情况，请勿用于正式用途。</p>
            <p>感谢您的理解与支持，我们会尽快完善并正式上线！</p>
        </div>

        <h2>欢迎来到我的航空摄影网站</h2>
        <p>本项目预计一年内完成，未来这里将展示优质的航空摄影作品与飞行记录。</p>
        <p>作为建站新手，我会持续学习和优化，也欢迎对航空摄影或网站开发感兴趣的朋友加入交流。</p>
        <p>如果您愿意提供无偿的技术支持或建议，欢迎随时与我联系。</p>
    </div>

    <!-- 核心：读取登录信息的脚本 -->
    <script>
        // 页面加载时检查是否有登录的用户名
        window.onload = function() {
            var username = localStorage.getItem('currentUser');
            var welcomeDiv = document.getElementById('welcomeMessage');
            var navBar = document.getElementById('navBar');

            // 如果有用户名，显示欢迎语，并隐藏登录/注册按钮
            if (username) {
                welcomeDiv.innerText = '欢迎回来，' + username + '！';
                
                // 清空原有按钮，只保留传照片和留言
                navBar.innerHTML = `
                    <a href="upload.html" class="nav-btn">传照片</a>
                    <a href="feedback.html" class="nav-btn">给站长留言</a>
                    <a href="javascript:logout()" class="nav-btn">退出登录</a>
                `;
            }
        };

        // 退出登录函数
        function logout() {
            localStorage.removeItem('currentUser');
            window.location.href = 'index.html'; // 刷新页面返回首页
        }
    </script>
</body>
</html>
