<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WZQ Photos - 航空摄影网站</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Microsoft Yahei", sans-serif; }
        body { background: #f0f3f5; padding: 20px; }
        
        /* 关键修复：头部采用弹性布局，确保文字和按钮都显示 */
        .header {
            background: #1F4D37;
            color: #fff;
            padding: 20px 24px;
            border-radius: 8px;
            margin-bottom: 20px;
            /* 核心布局：横向排列，自动换行 */
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 15px; /* 防止元素挤在一起 */
        }

        .header h1 { font-size: 28px; }
        
        /* 欢迎语样式：确保白色、显眼 */
        .welcome-text {
            color: #ffffff;
            font-size: 18px;
            font-weight: bold;
            /* 让文字占满中间空间，按钮靠右 */
            flex-grow: 1;
            text-align: center;
        }

        /* 导航按钮容器 */
        .nav-buttons {
            display: flex;
            gap: 10px;
        }

        /* 按钮样式统一 */
        .nav-btn {
            background-color: #2E8B57;
            color: white;
            padding: 10px 18px;
            text-decoration: none;
            border-radius: 6px;
            font-size: 16px;
            white-space: nowrap; /* 防止按钮文字换行 */
        }

        .nav-btn:hover { background-color: #39ac6e; }

        .test-notice {
            background: #fff3cd;
            border: 1px solid #ffeaa7;
            color: #856404;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
        }

        .content h2 { color: #1F4D37; margin-bottom: 15px; }
        .content p { color: #444; line-height: 1.6; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>WZQ Photos</h1>
        
        <!-- 1. 欢迎语区域：登录后显示 -->
        <div id="welcomeMessage" class="welcome-text"></div>

        <!-- 2. 导航按钮区域：默认显示登录/注册 -->
        <div class="nav-buttons" id="navBar">
            <a href="upload.html" class="nav-btn">传照片</a>
            <a href="feedback.html" class="nav-btn">给站长留言</a>
            <a href="login.html" class="nav-btn">登录</a>
            <a href="register.html" class="nav-btn">用户注册</a>
        </div>
    </div>

    <div class="content">
        <div class="test-notice">
            <strong>⚠️ 网站测试公告：</strong>
            <p>此网站目前处于测试阶段，功能尚未完全开放。</p>
        </div>

        <h2>欢迎来到我的航空摄影网站</h2>
        <p>本项目预计一年内完成，未来这里将展示优质的航空摄影作品。</p>
    </div>

    <script>
        // 页面加载后立即执行
        window.onload = function() {
            // 从本地存储读取当前登录用户
            const currentUser = localStorage.getItem('currentUser');
            const welcomeEl = document.getElementById('welcomeMessage');
            const navBarEl = document.getElementById('navBar');

            // 如果有用户信息（已登录）
            if (currentUser) {
                // 显示：欢迎回来，XXX！
                welcomeEl.innerText = `欢迎回来，${currentUser}！`;
                
                // 替换按钮：去掉登录/注册，显示退出
                navBarEl.innerHTML = `
                    <a href="upload.html" class="nav-btn">传照片</a>
                    <a href="feedback.html" class="nav-btn">给站长留言</a>
                    <a href="javascript:logout()" class="nav-btn">退出登录</a>
                `;
            }
        };

        // 退出登录函数
        function logout() {
            localStorage.removeItem('currentUser'); // 清除用户状态
            window.location.href = 'index.html'; // 刷新回到首页
        }
    </script>
</body>
</html>
