<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WZQ Photos - 航空图库</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: sans-serif;
        }
        body {
            background-color: #f8f9fa;
        }
        /* 顶部导航栏 */
        .header {
            background-color: #1F4D37; /* 墨绿色 */
            color: white;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 {
            font-size: 18px;
            font-weight: 600;
        }
        .nav-buttons {
            display: flex;
            gap: 10px;
        }
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            color: white;
            cursor: pointer;
            font-size: 14px;
            text-decoration: none;
            display: inline-block;
        }
        .btn-upload {
            background-color: #2E7D60; /* 稍亮的墨绿色 */
        }
        .btn-message {
            background-color: #2E7D60;
        }
        .btn-rules {
            background-color: #2E7D60;
        }
        .btn-register {
            background-color: #4CAF50;
        }
        /* 主体内容 */
        .main {
            max-width: 800px;
            margin: 40px auto;
            text-align: center;
            color: #333;
        }
        .main h2 {
            color: #1F4D37;
            font-size: 18px;
            margin-bottom: 15px;
        }
        .main p {
            font-size: 14px;
            line-height: 1.6;
            margin: 5px 0;
        }
        /* 传图规则弹窗（默认隐藏） */
        .rules-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
        }
        .rules-content {
            background: white;
            padding: 25px;
            border-radius: 8px;
            max-width: 500px;
            width: 90%;
        }
        .rules-content h3 {
            color: #1F4D37;
            margin-bottom: 15px;
        }
        .rules-content ul {
            text-align: left;
            margin: 15px 0;
            padding-left: 20px;
        }
        .rules-content li {
            margin: 8px 0;
            font-size: 14px;
        }
        .close-btn {
            background: #1F4D37;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 15px;
        }
        /* 底部 */
        .footer {
            background-color: #222;
            color: #ccc;
            text-align: center;
            padding: 12px;
            font-size: 12px;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>
<body>
    <!-- 顶部导航 -->
    <div class="header">
        <h1>WZQ Photos</h1>
        <div class="nav-buttons">
            <button class="btn btn-upload" onclick="document.getElementById('fileInput').click()">上传照片</button>
            <input type="file" id="fileInput" accept="image/*" style="display: none;" onchange="handleFileSelect(event)">
            
            <a href="feedback.html" class="btn btn-message">给站长留言</a>
            
            <button class="btn btn-rules" onclick="showRules()">传图规则</button>
            
            <button class="btn btn-register">用户注册</button>
        </div>
    </div>

    <!-- 主体内容 -->
    <div class="main">
        <h2>这是一个航空图库</h2>
        <p>如果你有兴趣，欢迎加入我们！</p>
        <p>微信：WZQ60722696</p>
        <p>邮箱：3810421790@qq.com</p>
    </div>

    <!-- 传图规则弹窗 -->
    <div class="rules-modal" id="rulesModal">
        <div class="rules-content">
            <h3>📸 传图规则</h3>
            <ul>
                <li>图片必须为航空相关内容（飞机、机场、飞行日志等）</li>
                <li>图片清晰，无水印、无遮挡，分辨率不低于 1920×1080</li>
                <li>禁止上传侵权、低俗、违法或与航空无关的内容</li>
                <li>上传即表示同意本站对图片进行展示和编辑</li>
            </ul>
            <button class="close-btn" onclick="closeRules()">关闭</button>
        </div>
    </div>

    <!-- 底部 -->
    <div class="footer">
        本网站由 GitHub 进行托管
    </div>

    <script>
        // 简单的图片上传处理（前端示例，实际需后端支持）
        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (file) {
                alert(`已选择图片：${file.name}\n（注：当前为静态页面，实际上传需后端支持）`);
            }
        }

        // 显示传图规则弹窗
        function showRules() {
            document.getElementById('rulesModal').style.display = 'flex';
        }

        // 关闭传图规则弹窗
        function closeRules() {
            document.getElementById('rulesModal').style.display = 'none';
        }
    </script>
</body>
</html>
