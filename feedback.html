<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>给站长留言 - WZQ Photos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            background: #f0f3f5;
        }
        .header {
            background: #1F4D37;
            color: #fff;
            padding: 14px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .nav-btn {
            color: #fff;
            text-decoration: none;
            padding: 8px 16px;
            border: 1px solid #fff;
            border-radius: 4px;
        }
        .form-box {
            max-width: 500px;
            margin: 40px auto;
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .form-box h2 {
            margin-bottom: 20px;
            color: #1F4D37;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        button {
            background: #1F4D37;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
        }
        .success {
            color: green;
            margin-top: 10px;
            display: none;
        }
        .test-notice {
            background-color: #fff3cd;
            border: 1px solid #ffeaa7;
            color: #856404;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>给站长留言</h1>
    <a href="index.html" class="nav-btn">返回首页</a>
</div>

<div style="padding: 30px;">
    <div class="test-notice">
        <strong>⚠️ 测试说明：</strong>
        <p>此留言功能处于测试阶段，提交后信息将发送至站长邮箱。</p>
        <p>请不要提交敏感或重要信息，数据仅供测试使用。</p>
    </div>

    <div class="form-box">
        <h2>留言反馈</h2>
        <form action="https://formsubmit.co/3810421790@qq.com" method="POST" onsubmit="showSuccess()">
            <input type="hidden" name="_subject" value="WZQ网站留言">
            <input type="hidden" name="_next" value="https://wzq2011.github.io/index.html">
            <input type="hidden" name="_honey" style="display:none">

            <div class="form-group">
                <label>你的姓名</label>
                <input type="text" name="姓名" required>
            </div>
            <div class="form-group">
                <label>你的邮箱</label>
                <input type="email" name="邮箱" required>
            </div>
            <div class="form-group">
                <label>留言内容</label>
                <textarea name="留言" rows="5" placeholder="请写下你对网站的建议、问题或想法..." required></textarea>
            </div>

            <button type="submit">提交留言</button>
            <div class="success" id="successText">✅ 留言提交成功！已发送至站长邮箱</div>
        </form>
    </div>
</div>

<script>
    function showSuccess() {
        document.getElementById("successText").style.display = "block";
        return true;
    }
</script>
<script>
const lang = {
  zh: {
    首页:"首页",
    上传照片:"上传照片",
    留言:"留言",
    登录:"登录",
    注册:"注册",
    公告:"这里写你的公告内容（中文）",
  },
  en: {
    首页:"Home",
    上传照片:"Upload Photo",
    留言:"Message",
    登录:"Login",
    注册:"Register",
    公告:"Your announcement here (English)",
  },
  ja: {
    首页:"ホーム",
    上传照片:"写真アップロード",
    留言:"メッセージ",
    登录:"ログイン",
    注册:"登録",
    公告:"お知らせ内容",
  },
  ko: {
    首页:"홈",
    上传照片:"사진 업로드",
    留言:"메시지",
    登录:"로그인",
    注册:"회원가입",
    公告:"공지사항",
  },
  la: {
    首页:"Domus",
    上传照片:"Imago",
    留言:"Nuntium",
    登录:"Login",
    注册:"Inscribe",
    公告:"Monitum",
  }
};

let current = localStorage.getItem('lang') || 'zh';
document.querySelectorAll('[i18n]').forEach(e => {
  let key = e.getAttribute('i18n');
  e.innerText = lang[current][key] || e.innerText;
});
</script>

</body>
</html>
