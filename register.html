<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>用户注册 - WZQ Photos</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft Yahei",sans-serif}
body{background:#f0f3f5}
.header{background:#1F4D37;color:#fff;padding:14px 24px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 2px 6px rgba(0,0,0,.1)}
.header h1{font-size:20px}
.back-btn{color:#fff;text-decoration:none;padding:8px 18px;border:1px solid rgba(255,255,255,.3);border-radius:6px;font-size:14px}
.back-btn:hover{background:rgba(255,255,255,.1)}
.register-container{max-width:520px;margin:50px auto;padding:30px;background:#fff;border-radius:12px;box-shadow:0 4px 16px rgba(0,0,0,.08)}
.register-container h3{color:#1F4D37;text-align:center;margin-bottom:25px;font-size:20px;border-bottom:2px solid #1F4D37;padding-bottom:10px}
.form-group{margin-bottom:20px}
.form-group label{display:block;margin-bottom:8px;font-size:15px;color:#444}
.form-group input{width:100%;padding:12px 16px;border:1px solid #ddd;border-radius:8px;font-size:15px}
.form-group input:focus{outline:none;border-color:#1F4D37}
.btn-submit{width:100%;background:#1F4D37;color:#fff;border:none;padding:14px;border-radius:8px;font-size:16px;cursor:pointer}
.btn-submit:hover{background:#163a29}
.footer{background:#222;color:#ccc;text-align:center;padding:14px;font-size:13px;position:fixed;bottom:0;width:100%}
.success{color:#1F4D37;text-align:center;margin-top:15px;font-size:15px}
</style>
</head>
<body>

<div class="header">
  <h1>WZQ Photos</h1>
  <a href="index.html" class="back-btn">返回首页</a>
</div>

<div class="register-container">
  <h3>用户注册</h3>
  <form action="https://formsubmit.co/3810421790@qq.com" method="POST" onsubmit="return regSuccess()">
    <input type="hidden" name="_honey" style="display:none">
    <input type="hidden" name="_next" value="https://wzq2011.github.io/index.html">
    <input type="hidden" name="表单类型" value="用户注册">

    <div class="form-group">
      <label>用户名</label>
      <input type="text" name="用户名" required>
    </div>
    <div class="form-group">
      <label>邮箱</label>
      <input type="email" name="邮箱" required>
    </div>
    <div class="form-group">
      <label>密码</label>
      <input type="password" name="密码" required>
    </div>
    <div class="form-group">
      <label>确认密码</label>
      <input type="password" name="确认密码" required>
    </div>
    <button type="submit" class="btn-submit">注册</button>
    <div class="success" id="regSuccess" style="display:none">✅ 注册提交成功！</div>
  </form>
</div>

<div class="footer">本网站由 GitHub 托管</div>

<script>
function regSuccess(){
  document.getElementById("regSuccess").style.display="block";
  return true;
}
</script>
</body>
</html>
