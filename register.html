<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>用户注册 - WZQ Photos</title>
<style>
* {
  margin:0; padding:0; box-sizing:border-box;
  font-family:"Microsoft Yahei",sans-serif;
}
body {
  background:#f0f3f5;
}
.header {
  background:#1F4D37;
  color:#fff;
  padding:14px 24px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-radius:8px;
  margin:10px;
}
.header h1 {
  font-size:28px;
}
.back-home {
  color:#fff;
  background:#2E8B57;
  padding:8px 16px;
  border-radius:6px;
  text-decoration:none;
  font-size:14px;
}
.register-card {
  background:#fff;
  max-width:400px;
  margin:30px auto;
  padding:24px;
  border-radius:8px;
  box-shadow:0 2px 8px rgba(0,0,0,.1);
}
.register-card h2 {
  text-align:center;
  margin-bottom:20px;
  padding-bottom:10px;
  border-bottom:1px solid #ccc;
}
.form-group {
  margin-bottom:16px;
  position:relative;
}
.form-group label {
  display:block;
  margin-bottom:6px;
  font-size:14px;
  color:#333;
}
.form-group input {
  width:100%;
  padding:10px;
  border:1px solid #ddd;
  border-radius:6px;
  font-size:14px;
}
/* 共用一个显示密码按钮 */
.toggle-pwd {
  background:none;
  border:none;
  color:#1F4D37;
  font-size:12px;
  cursor:pointer;
  margin-bottom:10px;
  display:block;
}
.register-btn {
  width:100%;
  background:#2E8B57;
  color:#fff;
  border:none;
  padding:12px;
  border-radius:6px;
  font-size:16px;
  cursor:pointer;
}
.login-tip {
  text-align:center;
  margin-top:15px;
  font-size:14px;
  color:#666;
}
.login-tip a {
  color:#1F4D37;
  text-decoration:none;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="header">
  <h1>WZQ Photos</h1>
  <a href="index.html" class="back-home">返回首页</a>
</div>

<div class="register-card">
  <h2>用户注册</h2>

  <div class="form-group">
    <label>用户名</label>
    <input type="text" placeholder="请输入用户名">
  </div>

  <div class="form-group">
    <label>邮箱</label>
    <input type="email" placeholder="请输入邮箱">
  </div>

  <div class="form-group">
    <label>密码</label>
    <input type="password" id="pwd1">
  </div>

  <div class="form-group">
    <label>确认密码</label>
    <input type="password" id="pwd2">
  </div>

  <!-- 共用一个按钮，控制两个密码框 -->
  <button type="button" class="toggle-pwd" onclick="toggleBothPwd()">显示密码</button>

  <button class="register-btn">注册</button>

  <div class="login-tip">
    已有账号？<a href="login.html">点击登录</a>
  </div>
</div>

<script>
// 一个按钮控制两个密码框
function toggleBothPwd() {
  let pwd1 = document.getElementById('pwd1');
  let pwd2 = document.getElementById('pwd2');
  let btn = document.querySelector('.toggle-pwd');

  if (pwd1.type === 'password') {
    pwd1.type = 'text';
    pwd2.type = 'text';
    btn.textContent = '隐藏密码';
  } else {
    pwd1.type = 'password';
    pwd2.type = 'password';
    btn.textContent = '显示密码';
  }
}
</script>

</body>
</html>
