<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>用户登录 - WZQ Photos</title>
<style>
* {
  margin:0; padding:0; box-sizing:border-box;
  font-family:"Microsoft Yahei",sans-serif;
}
body {
  background:#f0f3f5;
}
.header {
  background:#1F4D37;
  color:#fff;
  padding:14px 24px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-radius:8px;
  margin:10px;
}
.header h1 {
  font-size:28px;
}
.back-home {
  color:#fff;
  background:#2E8B57;
  padding:8px 16px;
  border-radius:6px;
  text-decoration:none;
  font-size:14px;
}
.login-card {
  background:#fff;
  max-width:400px;
  margin:30px auto;
  padding:24px;
  border-radius:8px;
  box-shadow:0 2px 8px rgba(0,0,0,.1);
}
.login-card h2 {
  text-align:center;
  margin-bottom:20px;
  padding-bottom:10px;
  border-bottom:1px solid #ccc;
}
.form-group {
  margin-bottom:16px;
  position:relative;
}
.form-group label {
  display:block;
  margin-bottom:6px;
  font-size:14px;
  color:#333;
}
.form-group input {
  width:100%;
  padding:10px;
  border:1px solid #ddd;
  border-radius:6px;
  font-size:14px;
}
.toggle-pwd {
  position:absolute;
  right:10px;
  top:32px;
  background:none;
  border:none;
  color:#1F4D37;
  font-size:12px;
  cursor:pointer;
}
.login-btn {
  width:100%;
  background:#2E8B57;
  color:#fff;
  border:none;
  padding:12px;
  border-radius:6px;
  font-size:16px;
  cursor:pointer;
}
.register-tip {
  text-align:center;
  margin-top:15px;
  font-size:14px;
  color:#666;
}
.register-tip a {
  color:#1F4D37;
  text-decoration:none;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="header">
  <h1>WZQ Photos</h1>
  <a href="index.html" class="back-home">返回首页</a>
</div>

<div class="login-card">
  <h2>用户登录</h2>

  <div class="form-group">
    <label>用户名</label>
    <input type="text" placeholder="请输入注册时的用户名">
  </div>

  <div class="form-group">
    <label>密码</label>
    <input type="password" id="pwd">
    <button type="button" class="toggle-pwd" onclick="togglePwd()">显示密码</button>
  </div>

  <button class="login-btn">登录</button>

  <div class="register-tip">
    还没有注册吗？<a href="register.html">点击注册</a>
  </div>
</div>

<script>
function togglePwd() {
  let input = document.getElementById('pwd');
  let btn = document.querySelector('.toggle-pwd');

  if(input.type === 'password') {
    input.type = 'text';
    btn.textContent = '隐藏密码';
  } else {
    input.type = 'password';
    btn.textContent = '显示密码';
  }
}
</script>

</body>
</html>
